name: "Patch & build single V8 d8 (Linux + Windows)"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "V8 tag to build (e.g. 12.0.267.5)"
        required: true
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  group: patch-single-${{ inputs.version }}
  cancel-in-progress: false

env:
  V8_REPO: https://github.com/v8/v8.git
  VERSION: ${{ inputs.version }}

jobs:
  build:
    name: Build ${{ matrix.os }} - ${{ inputs.version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022]
    env:
      ASSIGNED_JSON: ${{ format('["{0}"]', inputs.version) }}
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
      GYP_MSVS_VERSION: "2022"
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git to use LF line endings
        run: git config --global core.autocrlf false

      - name: Prepare (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y python3 python-is-python3 build-essential clang libglib2.0-dev flex bison git curl unzip pkg-config patch
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH
          export PATH="$PWD/depot_tools:$PATH"
          python --version
          gclient --version

      - name: Prepare (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          chcp 65001
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          $env:PATH = "$PWD\depot_tools;" + $env:PATH
          "$PWD\depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "PYTHONUTF8=1"                 | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PYTHONIOENCODING=UTF-8"       | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DEPOT_TOOLS_WIN_TOOLCHAIN=0"  | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GYP_MSVS_VERSION=2022"        | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          python --version
          gclient --version

      - name: Fix Windows SDK path for V8 10.8
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # V8 10.8's setup_toolchain.py expects SDK 10.0.20348.0 but
          # windows-2022 has a newer version. Find the actual installed SDK
          # and create a junction so the old path resolves.
          $sdkBase = "C:\Program Files (x86)\Windows Kits\10"
          $installed = Get-ChildItem "$sdkBase\Include" -Directory | Where-Object { $_.Name -match '^10\.' } | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $installed) { Write-Output "No SDK found"; exit 1 }
          $actualVer = $installed.Name
          Write-Output "Installed SDK: $actualVer"
          # Check if 10.0.20348.0 already exists
          $oldPath = "$sdkBase\Include\10.0.20348.0"
          if (-not (Test-Path $oldPath)) {
            Write-Output "Creating junction: $oldPath -> $($installed.FullName)"
            cmd /c mklink /J "$oldPath" "$($installed.FullName)"
            # Also junction the Lib path
            $oldLib = "$sdkBase\Lib\10.0.20348.0"
            $actualLib = "$sdkBase\Lib\$actualVer"
            if ((Test-Path $actualLib) -and -not (Test-Path $oldLib)) {
              cmd /c mklink /J "$oldLib" "$actualLib"
            }
          } else {
            Write-Output "10.0.20348.0 already exists"
          }

      - name: Initial sync (V8)
        shell: bash
        run: |
          set -eux
          gclient config --name v8 --unmanaged $V8_REPO
          gclient sync --nohooks -D --no-history
          gclient runhooks

      - name: Copy helper scripts & patches
        run: |
          cp apply_patch.py v8/
          cp patch_v2.diff v8/
          cp patch_1_v2.diff v8/
          cp patch_old_v2.diff v8/
          cp patch_10.8.168.25.diff v8/
          cp partition_versions.py v8/ || true

      - name: Build d8 with patch
        shell: bash
        env:
          ASSIGNED_JSON: ${{ env.ASSIGNED_JSON }}
        run: |
          set -e
          python3 build_versions_batch_v3.py || true
          echo "Single-version build finished (see failed_versions.txt if any)."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: d8-${{ inputs.version }}-${{ matrix.os }}
          path: |
            artifacts/**
            success_versions.txt
            failed_versions.txt
          retention-days: 14
